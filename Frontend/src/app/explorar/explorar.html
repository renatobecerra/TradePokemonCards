<div class="explorar-page">
  <!-- Navbar Post-Login Mejorada -->
  <nav class="explorar-nav">
    <div class="nav-container">
      <div class="nav-left">
        <div class="logo" routerLink="/">
          <span class="bracket">[</span>POKET<span class="bracket">]</span>.
        </div>
      </div>

      @if (currentUser()) {
        <div class="nav-center">
          <a routerLink="/explorar">EXPLORAR</a>
          <a routerLink="/inventario">MI INVENTARIO</a>
          <a routerLink="/mensajes">MENSAJES</a>
        </div>

        <div class="nav-right">
          <div class="profile-dropdown-wrapper">
            <button class="profile-trigger" (click)="toggleProfileMenu($event)">
              <div class="user-meta">
                <span class="welcome-label">BIENVENIDO/A</span>
                <span class="user-name-premium">{{ currentUser().nombre }} {{ currentUser().apellido }}</span>
              </div>
              <div class="avatar-container-premium">
                @if (currentUser().foto) {
                  <img [src]="currentUser().foto" alt="Avatar" class="avatar-img-premium">
                } @else {
                  <div class="avatar-placeholder-premium">
                    {{ currentUser().nombre.charAt(0) }}{{ currentUser().apellido?.charAt(0) }}
                  </div>
                }
                <div class="status-indicator-premium" [style.background]="getPresenceColor()"></div>
              </div>
              <svg class="chevron-premium" [class.open]="showProfileMenu()" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>

            <div class="dropdown-menu" [class.show]="showProfileMenu()">
              <div class="menu-header">
                <p class="menu-label">Estado de Presencia</p>
              </div>
              <div class="status-selector">
                <button (click)="setPresence($event, 1)" class="status-option" [class.active]="currentUser()?.estadoPresencia === 1">
                  <span class="status-dot online"></span> Conectado
                </button>
                <button (click)="setPresence($event, 2)" class="status-option" [class.active]="currentUser()?.estadoPresencia === 2">
                  <span class="status-dot dnd"></span> No Molestar
                </button>
                <button (click)="setPresence($event, 0)" class="status-option" [class.active]="currentUser()?.estadoPresencia === 0">
                  <span class="status-dot offline"></span> Invisible
                </button>
              </div>
            <div class="menu-divider"></div>

            <div class="menu-header">
              <p class="menu-label">Mi Cuenta</p>
            </div>
              <a routerLink="/perfil" class="menu-item">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                Ver Perfil
              </a>
              <div class="menu-divider"></div>
              <button (click)="onLogout()" class="menu-item logout">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Cerrar Sesión
              </button>
            </div>
          </div>
        </div>
      }
    </div>
  </nav>

  <!-- Marketplace Content -->
  <main class="explorar-content">
    <div class="tcg-container">
      <h1 class="section-title">Cartas Destacadas (TCGdex)</h1>
      <div class="tcg-grid">
        @for (card of cartasTcg(); track card.id) {
          <div class="card-item">
            <div class="card-image-wrapper">
              <img [src]="card.image + '/low.jpg'" [alt]="card.name" class="card-img">
            </div>
            <div class="card-info">
              <h3 class="card-name">{{ card.name }}</h3>
              <p class="card-rarity">{{ card.rarity || 'Común' }}</p>
            </div>
          </div>
        }
      </div>
    </div>
  </main>
</div>
